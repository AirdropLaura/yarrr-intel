# Server config for yarrr-node.com
# Fronted by certbot — TLS managed by certbot-managed include directives.

server {
    listen 80;
    listen [::]:80;
    server_name yarrr-node.com www.yarrr-node.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Force HTTPS for everything else.
    location / {
        return 301 https://yarrr-node.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yarrr-node.com;

    ssl_certificate     /etc/letsencrypt/live/yarrr-node.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yarrr-node.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Reasonable limits for log paste
    client_max_body_size 1m;
    client_body_buffer_size 128k;

    # API routes go to FastAPI
    location /api/ {
        proxy_pass http://127.0.0.1:8421;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Streaming responses (SSE) need these.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # Frontend (Next.js export) served as static.
    location / {
        root /var/www/yarrr-tech;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Static asset caching
        location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|webp|ico)$ {
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }
    }
}
